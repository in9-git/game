<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240">
  <defs>
    <linearGradient id="swooshGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#b4ff00"/>
      <stop offset="30%" stop-color="#d4e800"/>
      <stop offset="55%" stop-color="#ffaa00"/>
      <stop offset="80%" stop-color="#ff5050"/>
      <stop offset="100%" stop-color="#ff2070"/>
    </linearGradient>
    <filter id="swooshGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="touchGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="saturate" values="3" result="saturated"/>
      <feMerge>
        <feMergeNode in="saturated"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="touchFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5fff90" stop-opacity="1"/>
      <stop offset="35%" stop-color="#39e87c" stop-opacity="0.95"/>
      <stop offset="65%" stop-color="#0d7a3e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#065f2b" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <rect width="600" height="240" fill="#050510" rx="16"/>

  <!-- NIKE-STYLE SWOOSH — soft rounded heel, graceful upward sweep, long thin tail -->
  <g transform="translate(52, 30) scale(1.15)">
    <path d="M 60 132
             C 36 128, 16 112, 14 86
             C 12 58, 30 34, 56 26
             C 72 22, 84 28, 84 40
             C 84 52, 74 62, 60 74
             C 48 84, 42 94, 46 102
             C 50 110, 64 110, 86 102
             C 130 86, 200 60, 280 36
             C 340 18, 410 6, 470 2
             C 420 14, 350 30, 270 52
             C 200 72, 140 92, 96 110
             C 80 118, 70 126, 60 132 Z"
          fill="url(#swooshGrad)" filter="url(#swooshGlow)"/>
  </g>

  <!-- TOUCH RIPPLE — at the heel of the swoosh, vivid green -->
  <circle cx="108" cy="170" r="11" fill="url(#touchFill)" filter="url(#touchGlow)"/>
  <circle cx="108" cy="170" r="11" fill="#5fff90" opacity="0.5"/>
  <circle cx="108" cy="170" r="19" fill="none" stroke="#39e87c" stroke-width="3" opacity="0.85"/>
  <circle cx="108" cy="170" r="29" fill="none" stroke="#15c95a" stroke-width="2.5" opacity="0.6"/>
  <circle cx="108" cy="170" r="41" fill="none" stroke="#0d9a4e" stroke-width="2" opacity="0.38"/>
  <circle cx="108" cy="170" r="55" fill="none" stroke="#0d7a3e" stroke-width="1.5" opacity="0.18"/>

  <!-- "Just play it." -->
  <text x="310" y="200" text-anchor="middle"
        font-family="'Futura', 'Helvetica Neue', 'Arial Black', sans-serif"
        font-size="48" font-weight="900" font-style="italic"
        fill="white" letter-spacing="-2">
    Just play it.
  </text>

  <text x="310" y="228" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="300"
        fill="#555" letter-spacing="4">
    game.in-9.com
  </text>
</svg>
