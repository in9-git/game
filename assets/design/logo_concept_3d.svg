<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240">
  <defs>
    <linearGradient id="swoosh3d" x1="0%" y1="50%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="35%" stop-color="#8b5cf6"/>
      <stop offset="65%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <filter id="glow3d">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="600" height="240" fill="#0a0a1a" rx="16"/>

  <!-- THE SWOOSH - Nike DNA injected at maximum dosage -->
  <!-- Nike swoosh = thick bottom-left heel, curves up-right, sharp taper to point -->
  <path d="M 68,108
           C 72,118 80,124 95,124
           C 120,124 148,116 180,102
           C 230,80 290,52 360,38
           C 420,26 480,16 540,6
           L 538,8
           C 480,18 430,30 380,40
           C 310,55 250,72 200,88
           C 160,100 130,108 110,112
           C 95,115 82,112 74,105
           Z"
        fill="url(#swoosh3d)" filter="url(#glow3d)"/>

  <!-- Fingertip touch at the heel of the swoosh -->
  <circle cx="76" cy="112" r="5" fill="#6c5ce7"/>
  <circle cx="76" cy="112" r="11" fill="none" stroke="#6c5ce7" stroke-width="1.2" opacity="0.4"/>
  <circle cx="76" cy="112" r="18" fill="none" stroke="#6c5ce7" stroke-width="0.7" opacity="0.15"/>

  <!-- Speed whisper lines at the tip -->
  <line x1="530" y1="10" x2="555" y2="2" stroke="#ff6b9d" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
  <line x1="525" y1="16" x2="552" y2="8" stroke="#ff6b9d" stroke-width="0.8" opacity="0.18" stroke-linecap="round"/>

  <!-- "Just play it." - Nike Futura-style bold italic -->
  <text x="300" y="175" text-anchor="middle"
        font-family="'Helvetica Neue', 'Futura', 'Arial Black', Impact, sans-serif"
        font-size="56" font-weight="900" font-style="italic"
        fill="white" letter-spacing="-2">
    Just play it.
  </text>

  <!-- Tagline -->
  <text x="300" y="206" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="400"
        fill="#888" letter-spacing="3">
    ANYONE CAN START. RIGHT NOW.
  </text>

  <text x="300" y="230" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="300"
        fill="#444" letter-spacing="3">
    game.in-9.com
  </text>
</svg>
