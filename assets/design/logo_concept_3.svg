<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="50%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
  </defs>

  <rect width="600" height="220" fill="#0a0a1a" rx="16"/>

  <!-- Minimalist swoosh - single smooth curve, thin to thick -->
  <!-- Start thin (fingertip), sweep wide -->
  <path d="M 90,80 C 140,82 180,95 240,70 C 300,45 380,35 480,55"
        stroke="url(#grad3)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 240,70 C 300,45 380,35 480,55"
        stroke="url(#grad3)" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 380,40 C 420,42 460,48 500,56"
        stroke="#ff6b9d" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Touch dot -->
  <circle cx="90" cy="80" r="6" fill="#6c5ce7"/>
  <circle cx="90" cy="80" r="11" fill="none" stroke="#6c5ce7" stroke-width="1.5" opacity="0.3"/>

  <!-- Play triangle integrated at the end -->
  <polygon points="490,45 510,55 490,65" fill="#FF6B00" opacity="0.7"/>

  <!-- "Just play it." - clean modern -->
  <text x="300" y="148" text-anchor="middle"
        font-family="'Helvetica Neue', 'Segoe UI', Arial, sans-serif"
        font-size="44" font-weight="700" font-style="italic"
        fill="white" letter-spacing="-0.5">
    Just play it.
  </text>

  <!-- Tagline -->
  <text x="300" y="178" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="12" font-weight="400"
        fill="#888" letter-spacing="2">
    ANYONE CAN START. RIGHT NOW.
  </text>

  <text x="300" y="203" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="300"
        fill="#444" letter-spacing="3">
    game.in-9.com
  </text>
</svg>
