<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FFAA00"/>
    </linearGradient>
  </defs>

  <rect width="600" height="220" fill="#0a0a1a" rx="16"/>

  <!-- Nike-style swoosh: thick, confident, one stroke -->
  <!-- Starts big on the left (like a heel of a swoosh), curves up and tapers to a point -->
  <path d="M 70,100 C 100,100 120,105 160,90 C 220,65 300,35 400,40 C 450,42 490,30 520,20"
        stroke="none" fill="url(#grad4)"/>
  <path d="M 70,100 C 100,108 130,110 170,100 C 230,82 310,60 400,55 C 450,52 490,38 520,20
           C 490,30 450,42 400,40 C 300,35 220,65 160,90 C 120,105 100,100 70,100 Z"
        fill="url(#grad4)" opacity="0.9"/>

  <!-- Fingertip pulse at start -->
  <circle cx="70" cy="100" r="5" fill="#FF6B00"/>
  <circle cx="70" cy="100" r="10" fill="none" stroke="#FF6B00" stroke-width="1" opacity="0.4"/>

  <!-- "Just" in light, "play it." in bold -->
  <text x="175" y="165" text-anchor="start"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="50" font-weight="300" font-style="italic"
        fill="#ccc">
    Just
  </text>
  <text x="305" y="165" text-anchor="start"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="50" font-weight="900" font-style="italic"
        fill="white">
    play it.
  </text>

  <text x="300" y="200" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="12" font-weight="400"
        fill="#555" letter-spacing="3">
    game.in-9.com
  </text>
</svg>
