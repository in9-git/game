<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="sw" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="40%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#ff4081"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="#0a0a12"/>

  <!-- ========== THE SWOOSH ========== -->
  <!-- Reverse-engineered Nike swoosh geometry:
       - Heel: fat rounded bulge at bottom-left
       - Body: sweeping curve upward to the right
       - Tip: razor-sharp taper to upper-right point
       - The inner curve is much tighter than the outer curve
       - Height-to-width ratio ~1:3.5 -->
  <path d="M 95,235
           C 85,250 82,265 92,272
           C 102,279 118,275 140,265
           C 175,248 220,222 280,195
           C 360,160 450,120 530,95
           C 600,74 660,52 710,30
           C 670,46 620,65 560,82
           C 480,105 400,135 320,165
           C 250,192 195,218 155,238
           C 130,250 112,256 102,250
           C 92,244 92,238 95,235
           Z"
        fill="url(#sw)" filter="url(#gl)"/>

  <!-- Fingertip touch ripple on the heel -->
  <circle cx="92" cy="260" r="6" fill="#7c3aed" opacity="0.9"/>
  <circle cx="92" cy="260" r="14" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <circle cx="92" cy="260" r="24" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.15"/>

  <!-- "Just play it." -->
  <!-- Futura Condensed Extra Bold Oblique is the Nike font. -->
  <!-- We approximate with Helvetica Neue Black Italic -->
  <text x="400" y="345" text-anchor="middle"
        font-family="'Futura', 'Helvetica Neue', 'Arial Black', sans-serif"
        font-size="72" font-weight="900" font-style="italic"
        fill="white" letter-spacing="-3">
    Just play it.
  </text>

  <!-- Subtle domain -->
  <text x="400" y="385" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="300"
        fill="#555" letter-spacing="4">
    game.in-9.com
  </text>
</svg>
