<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="google" content="notranslate">
<title>베이비장기 - Baby Janggi</title>
<script src="coi-serviceworker.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background:
    radial-gradient(ellipse 120% 90% at 50% -10%, #33241556 0%, transparent 55%),
    radial-gradient(ellipse 100% 80% at 50% 100%, #241a1066 0%, transparent 60%),
    repeating-linear-gradient(91deg, rgba(74,52,28,0.09) 0px, rgba(74,52,28,0.09) 2px, transparent 2px, transparent 8px),
    repeating-linear-gradient(89deg, rgba(16,11,7,0.16) 0px, rgba(16,11,7,0.16) 1px, transparent 1px, transparent 13px),
    #19120d;
  color: #efe6d6;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}
#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 16px;
  width: 100%;
  max-width: 520px;
}
h1 {
  font-family: 'Nanum Myeongjo', 'AppleMyungjo', 'Batang', serif;
  font-size: 27px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #e8c168;
  text-shadow: 0 1px 1px rgba(0,0,0,0.45);
  display: inline-flex;
  align-items: center;
  gap: 13px;
}
h1::before, h1::after {
  content: "";
  width: 22px;
  height: 1px;
  flex: none;
  background: linear-gradient(90deg, transparent, #c99a3e 85%);
}
h1::after { background: linear-gradient(90deg, #c99a3e 15%, transparent); }
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  gap: 12px;
}
.status {
  font-size: 15px;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 8px;
  background: #2a2018;
  flex: 1;
  text-align: center;
}
.status.cho-turn { color: #ff6b6b; border: 1px solid #ff6b6b33; }
.status.han-turn { color: #51cf66; border: 1px solid #51cf6633; }
.status.game-over { color: #f3cf5e; border: 1px solid #f3cf5e33; }
button {
  background: #2a2018;
  color: #efe6d6;
  border: 1px solid #473627;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  font-family: inherit;
}
button:hover { background: #3b2e18; border-color: #c99a3e; }
button.active { background: #3b2e18; border-color: #c99a3e; color: #c99a3e; }
select {
  background: #2a2018;
  color: #efe6d6;
  border: 1px solid #473627;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
}
.board-container {
  position: relative;
  background:
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 47px,
      rgba(139,100,20,0.08) 47px,
      rgba(139,100,20,0.08) 49px
    ),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 47px,
      rgba(139,100,20,0.08) 47px,
      rgba(139,100,20,0.08) 49px
    ),
    repeating-linear-gradient(
      105deg,
      rgba(180,130,40,0.12) 0px,
      transparent 3px,
      rgba(160,110,20,0.08) 6px,
      transparent 9px,
      rgba(180,130,40,0.1) 14px,
      transparent 17px
    ),
    linear-gradient(160deg, #e8c06a 0%, #c8952a 30%, #d4a845 55%, #bf8f28 80%, #c9a040 100%);
  border-radius: 8px;
  padding: 22px;
  box-shadow:
    0 8px 32px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,220,100,0.3),
    inset 0 -2px 4px rgba(0,0,0,0.2);
  border: 3px solid #7a5010;
  outline: 6px solid #5a3a08;
  outline-offset: -3px;
}
.board-container::before {
  content: "";
  position: absolute;
  inset: 11px;
  border: 1px solid rgba(232,193,104,0.32);
  border-radius: 5px;
  pointer-events: none;
  z-index: 2;
}
.board {
  position: relative;
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  grid-template-rows: repeat(10, 1fr);
  width: 432px;
  height: 480px;
}
.board-lines {
  position: absolute;
  top: 22px;
  left: 22px;
  width: 432px;
  height: 480px;
  pointer-events: none;
}
.cell {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 1;
  width: 48px;
  height: 48px;
  touch-action: manipulation;
}
.piece {
  width: 44px;
  height: 44px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: transform 0.15s, filter 0.15s;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  user-select: none;
}
.piece img {
  width: 44px;
  height: 39px;
  object-fit: contain;
  pointer-events: none;
  filter: drop-shadow(0 1px 0 rgba(255,240,205,0.32)) drop-shadow(1px 3px 2.5px rgba(38,20,5,0.5));
}
/* 팬시 한글 장기말 — 베벨 나무 토큰 위에 한글 캘리그래피 */
.pc-han {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 26%;
  background: radial-gradient(circle at 38% 30%, #f8ecd2 0%, #ecd4a0 52%, #d8b675 100%);
  border: 1.5px solid #7c5520;
  box-shadow: inset 0 2px 3px rgba(255,255,255,0.55),
              inset 0 -3px 5px rgba(110,70,15,0.40),
              1px 2px 3px rgba(0,0,0,0.40);
  font-family: 'Nanum Myeongjo', 'AppleMyungjo', 'Batang', serif;
  font-weight: 800;
  line-height: 1;
  pointer-events: none;
}
.pc-han > i {
  font-style: normal;
  text-shadow: 0 1px 0 rgba(255,255,255,0.40);
}
.pc-han.cho > i { color: #0b6b34; }
.pc-han.han > i { color: #b5231b; }
.piece.in-check .pc-han { animation: checkFlash 0.55s ease-in-out 6; }
.piece.cho {}
.piece.han {}
.piece.selected {
  filter: drop-shadow(0 0 6px #f3cf5e) drop-shadow(0 0 12px rgba(243,207,94,0.5));
  transform: translate(-50%, -50%) scale(1.15);
}
.piece.selected img {
  filter: drop-shadow(0 0 4px #f3cf5e);
}
.piece.recommended {
  animation: recommendPulse 1.5s ease-in-out infinite;
}
@keyframes recommendPulse {
  0%, 100% {
    filter: drop-shadow(0 0 4px #f3cf5e) drop-shadow(0 0 8px rgba(243,207,94,0.4));
  }
  50% {
    filter: drop-shadow(0 0 12px #f3cf5e) drop-shadow(0 0 20px rgba(243,207,94,0.6));
  }
}
.move-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(255, 212, 59, 0.5);
  position: absolute;
  z-index: 1;
  pointer-events: none;
}
.move-dot.capture {
  width: 42px;
  height: 42px;
  background: transparent;
  border: 3px solid rgba(255, 212, 59, 0.6);
}
.recommend-ghost {
  position: absolute;
  z-index: 3;
  pointer-events: none;
  animation: ghostPulse 1.8s ease-in-out infinite;
}
.recommend-ghost img {
  width: 44px;
  height: 39px;
  object-fit: contain;
}
@keyframes ghostPulse {
  0%, 100% {
    opacity: 0.38;
    filter: drop-shadow(0 0 4px rgba(243,207,94,0.5));
  }
  50% {
    opacity: 0.58;
    filter: drop-shadow(0 0 10px rgba(243,207,94,0.75));
  }
}
.game-layout {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  gap: 6px;
}
.mode-tabs {
  display: flex;
  gap: 6px;
  justify-content: center;
  width: 100%;
  max-width: 432px;
  padding: 4px 0;
}
.mode-tab {
  flex: 1;
  background: #1e1610;
  color: #9a8866;
  border: 1px solid #3a2c1d;
  padding: 9px 8px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.mode-tab:hover { border-color: #c99a3e88; color: #c8b690; }
.mode-tab.active {
  background: linear-gradient(135deg, #3b2e18, #4a3920);
  color: #f3cf5e;
  border-color: #c99a3e;
  box-shadow: 0 0 12px rgba(201,154,62,0.3);
}
.board-stack {
  display: flex;
  flex-direction: column;
  width: fit-content;
  align-items: stretch;
}
.trophy-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  height: 52px;
  min-height: 52px;
  padding: 6px 10px;
  background: rgba(38, 28, 17, 0.45);
  border: 1px solid rgba(150, 118, 70, 0.18);
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
}
.trophy-bar.top    { border-radius: 10px 10px 0 0; border-bottom: none; margin-bottom: 0; }
.trophy-bar.bottom { border-radius: 0 0 10px 10px; border-top: none; margin-top: 0; }
@keyframes trophyPulseHan {
  0%, 100% { border-color: rgba(255, 107, 107, 0.45); box-shadow: inset 0 0 0 rgba(255,107,107,0); }
  50%      { border-color: rgba(229, 110, 90, 0.78);  box-shadow: inset 0 0 9px rgba(229,110,90,0.26), 0 0 6px rgba(229,110,90,0.18); }
}
@keyframes trophyPulseCho {
  0%, 100% { border-color: rgba(105, 219, 124, 0.45); box-shadow: inset 0 0 0 rgba(105,219,124,0); }
  50%      { border-color: rgba(95, 188, 120, 0.78);  box-shadow: inset 0 0 9px rgba(95,188,120,0.26), 0 0 6px rgba(95,188,120,0.18); }
}
.trophy-bar.han.active { animation: trophyPulseHan 1.7s ease-in-out infinite; }
.trophy-bar.cho.active { animation: trophyPulseCho 1.7s ease-in-out infinite; }
.trophy-bar:empty:not(.active) { background: transparent; border-color: transparent; }
.captured-piece {
  display: flex;
  align-items: center;
  justify-content: center;
}
.captured-piece img { width: 28px; height: 28px; object-fit: contain; }
.captured-piece.cho img { filter: drop-shadow(0 0 2px rgba(255,135,135,0.5)); }
.captured-piece.han img { filter: drop-shadow(0 0 2px rgba(105,219,124,0.5)); }
.thinking {
  display: inline-block;
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.modal-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
}
.modal {
  background: #1c1511;
  border: 1px solid #473627;
  border-radius: 16px;
  padding: 32px;
  text-align: center;
  max-width: 360px;
}
.modal h2 { font-size: 24px; margin-bottom: 12px; font-weight: 300; }
.modal p { margin-bottom: 20px; color: #ab9c82; }
.modal button { font-size: 15px; padding: 10px 24px; }
.piece.last-moved {
  filter: drop-shadow(0 0 5px rgba(201,154,62,0.9)) drop-shadow(0 0 10px rgba(201,154,62,0.5));
}
@keyframes checkFlash {
  0%, 100% { filter: drop-shadow(0 0 6px rgba(255,60,60,1)) drop-shadow(0 0 14px rgba(255,0,0,0.7)); }
  50%      { filter: drop-shadow(0 0 18px rgba(255,80,80,1)) drop-shadow(0 0 32px rgba(255,0,0,1)); }
}
.piece.in-check img {
  animation: checkFlash 0.55s ease-in-out 6;
}
.animated-piece {
  position: absolute;
  z-index: 50;
  pointer-events: none;
}
.animated-piece img {
  width: 44px;
  height: 39px;
  object-fit: contain;
  filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.4));
}
@media (max-width: 480px) {
  body { overflow: auto; }
  #app { max-width: 100%; padding: 12px; gap: 12px; }
  h1 { font-size: 18px; letter-spacing: 2px; }
  .cell { width: 36px; height: 36px; }
  .piece { width: 33px; height: 33px; }
  .piece img { width: 33px; height: 29px; }
  .board { width: 324px; height: 360px; grid-template-columns: repeat(9, 36px); grid-template-rows: repeat(10, 36px); }
  .board-lines { width: 324px; height: 360px; top: 14px; left: 14px; transform: none; }
  .board-container { padding: 14px; width: auto; }
  .game-layout { gap: 10px; }
  .captures-side { width: 44px; max-height: 374px; }
  .captured-piece img { width: 33px; height: 29px; }
  .animated-piece img { width: 33px; height: 29px; }
  .trophy-bar { height: 44px; min-height: 44px; }
  .status { font-size: 13px; padding: 6px 12px; }
  button, select { font-size: 12px; padding: 6px 10px; }
  .lang-btn { padding: 6px 10px; font-size: 12px; }
  .top-bar { gap: 8px; }
  .controls-row { gap: 5px; }
  .controls-row button { padding: 7px 8px; font-size: 11px; letter-spacing: 0.5px; }
  .btn-start, .btn-stop { padding: 7px 10px; font-size: 11px; }
}
@media (max-width: 380px) {
  .cell { width: 30px; height: 30px; }
  .piece { width: 28px; height: 28px; }
  .piece img { width: 28px; height: 25px; }
  .board { width: 270px; height: 300px; grid-template-columns: repeat(9, 30px); grid-template-rows: repeat(10, 30px); }
  .board-lines { width: 270px; height: 300px; top: 10px; left: 10px; transform: none; }
  .board-container { padding: 10px; width: auto; }
  .captures-side { width: 38px; max-height: 310px; }
  .captured-piece img { width: 28px; height: 25px; }
  .animated-piece img { width: 28px; height: 25px; }
  .trophy-bar { height: 38px; min-height: 38px; }
}
.nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  gap: 8px;
}
.home-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #2a2018;
  color: #ab9c82;
  border: 1px solid #473627;
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 13px;
  text-decoration: none;
  transition: all 0.2s;
  font-family: inherit;
}
.home-btn:hover { background: #3b2e18; border-color: #c99a3e; color: #efe6d6; }
.lang-btn {
  background: #2a2018;
  color: #efe6d6;
  border: 1px solid #5b4631;
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  letter-spacing: 1px;
}
.lang-btn:hover { background: #3b2e18; border-color: #c99a3e; }
.controls {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
}
.controls-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}
.btn-start {
  background: #1a4a2e;
  color: #69db7c;
  border: 1px solid #2d8a4e;
  padding: 10px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.btn-start:hover { background: #22633d; border-color: #51cf66; }
.btn-stop {
  background: #3a1a1a;
  color: #ff8787;
  border: 1px solid #8a2d2d;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.btn-stop:hover { background: #5a2020; border-color: #ff6b6b; }
.btn-toggle {
  background: #1e1610;
  color: #9a8866;
  border: 1px solid #3a2c1d;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.btn-toggle:hover { border-color: #c99a3e88; color: #c8b690; }
.btn-toggle.active {
  background: #3b2e18;
  color: #f3cf5e;
  border-color: #c99a3e;
  box-shadow: 0 0 10px rgba(243,207,94,0.25);
}
.btn-toggle:disabled { opacity: 0.4; cursor: default; box-shadow: none; }
.btn-toggle:disabled:hover { border-color: #3a2c1d; color: #9a8866; }

/* ===== 온라인 대전 ===== */
/* 한(漢) 시점: 보드 180° 회전 + 기물 글자는 다시 정방향 */
.board-container.flipped { transform: rotate(180deg); }
.board-container.flipped .piece img,
.board-container.flipped .piece .pc-han,
.board-container.flipped .recommend-ghost img,
.board-container.flipped .recommend-ghost .pc-han { transform: rotate(180deg); }
.online-bar {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center;
  width: 100%; max-width: 432px; margin: 2px 0; font-size: 13px; font-weight: 600;
}
.online-bar .ot-code {
  cursor: pointer; color: #f3cf5e; background: #3b2e18; border: 1px solid #c99a3e;
  padding: 4px 10px; border-radius: 8px; letter-spacing: 1px;
}
.online-bar .ot-code:hover { background: #4a3920; }
.online-bar .ot-side { padding: 4px 10px; border-radius: 8px; border: 1px solid #3a2c1d; background: #1e1610; }
.online-bar .ot-side.cho { color: #69db7c; }
.online-bar .ot-side.han { color: #ff8787; }
.online-bar .ot-turn { padding: 4px 10px; border-radius: 8px; }
.online-bar .ot-turn.mine { color: #69db7c; background: rgba(105,219,124,0.14); }
.online-bar .ot-turn.opp  { color: #c8b690; background: rgba(90,110,140,0.14); }
.online-toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(26,58,92,0.96); color: #f3cf5e; border: 1px solid #c99a3e;
  padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 600;
  z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.5); white-space: nowrap;
}
.online-lobby .lobby-join { display: flex; gap: 8px; margin-top: 4px; }
.online-lobby input {
  flex: 1; background: #1e1610; border: 1px solid #46371f; color: #f0e7d6;
  padding: 10px 12px; border-radius: 8px; font-size: 16px; font-family: inherit;
  letter-spacing: 3px; text-align: center; text-transform: uppercase; min-width: 0;
}
.online-lobby input:focus { outline: none; border-color: #c99a3e; }
.room-code-big {
  font-size: 40px; font-weight: 700; letter-spacing: 10px; color: #f3cf5e;
  background: #1e1610; border: 2px dashed #c99a3e; border-radius: 12px;
  padding: 14px 8px 14px 18px; margin: 8px 0 14px; cursor: pointer; user-select: all;
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================
// CONSTANTS
// ============================================
const COLS = 9, ROWS = 10;
const CHO = 'cho', HAN = 'han';
const TYPES = { KING: 'king', GUARD: 'guard', HORSE: 'horse', ELEPHANT: 'elephant', CHARIOT: 'chariot', CANNON: 'cannon', SOLDIER: 'soldier' };

const PIECE_NAMES = {
  cho: { king: '楚', guard: '士', horse: '馬', elephant: '象', chariot: '車', cannon: '包', soldier: '兵' },
  han: { king: '漢', guard: '仕', horse: '馬', elephant: '象', chariot: '車', cannon: '砲', soldier: '卒' }
};

const PIECE_IMAGES = {
  cho: {
    king: 'img/Green_King.png',
    chariot: 'img/Green_Cha.png',
    cannon: 'img/Green_Po.png',
    horse: 'img/Green_Ma.png',
    elephant: 'img/Green_Sang.png',
    guard: 'img/Green_Sa.png',
    soldier: 'img/Green_Zol.png'
  },
  han: {
    king: 'img/Red_King.png',
    chariot: 'img/Red_Cha.png',
    cannon: 'img/Red_Po.png',
    horse: 'img/Red_Ma.png',
    elephant: 'img/Red_Sang.png',
    guard: 'img/Red_Sa.png',
    soldier: 'img/Red_Byung.png'
  }
};

// 팬시 한글 장기말 — 이미지 대신 CSS 나무 토큰 위에 한글을 새긴다 (state.koreanPieces)
const PIECE_HANGUL = {
  cho: { king: '초', guard: '사', horse: '마', elephant: '상', chariot: '차', cannon: '포', soldier: '병' },
  han: { king: '한', guard: '사', horse: '마', elephant: '상', chariot: '차', cannon: '포', soldier: '졸' }
};

// Piece size multipliers relative to board cell. King slightly larger as focal point.
const PIECE_SIZES = {
  king: 1.35,
  chariot: 1.3,
  cannon: 1.3,
  horse: 1.3,
  elephant: 1.3,
  guard: 1.3,
  soldier: 1.3
};

const PIECE_VALUES = { king: 0, chariot: 13, cannon: 7, horse: 5, elephant: 3, guard: 3, soldier: 2 };

// 게임 모드별 AI 프로필. 연습 모드도 충분히 강하게 (학습 가치 있게).
const DIFFICULTIES = [
  // index 0: 연습 모드 — 강하지만 너무 느리지 않게
  { name: '연습', depth: 3, random: 0.02, wasmDepth: 10, skillLevel: 18, limitStrength: false, elo: 2000 },
  // index 1, 2: 미사용 (대전/도전 모드는 추후 별도 프로필)
  { name: '대전', depth: 3, random: 0.02, wasmDepth: 12, skillLevel: 20, limitStrength: false, elo: 2400 },
  { name: '도전', depth: 4, random: 0,    wasmDepth: 15, skillLevel: 20, limitStrength: false, elo: 2800 }
];

// Palace boundaries
function inPalace(col, row, team) {
  if (col < 3 || col > 5) return false;
  if (team === HAN) return row >= 0 && row <= 2;
  return row >= 7 && row <= 9;
}

function inAnyPalace(col, row) {
  if (col < 3 || col > 5) return false;
  return (row >= 0 && row <= 2) || (row >= 7 && row <= 9);
}

// Palace diagonal connections
const PALACE_DIAG = [
  [[3,0],[4,1]], [[4,1],[5,2]], [[5,0],[4,1]], [[4,1],[3,2]],
  [[3,7],[4,8]], [[4,8],[5,9]], [[5,7],[4,8]], [[4,8],[3,9]]
];

function palaceDiagConnected(c1, r1, c2, r2) {
  return PALACE_DIAG.some(([[a,b],[c,d]]) =>
    (a===c1 && b===r1 && c===c2 && d===r2) || (a===c2 && b===r2 && c===c1 && d===r1));
}

function inBounds(c, r) { return c >= 0 && c < COLS && r >= 0 && r < ROWS; }

// ============================================
// SOUND ENGINE
// ============================================
let audioContext = null;

function initAudioContext() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioContext;
}

// 나무 장기알이 나무판에 닿는 소리 — noise burst + bandpass filter
function playWoodKnock(volume = 0.6, pitchMod = 1.0) {
  const ctx = initAudioContext();
  const now = ctx.currentTime;
  const bufLen = ctx.sampleRate * 0.08;
  const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);

  const src = ctx.createBufferSource();
  src.buffer = buf;

  // 나무 공명 대역 bandpass
  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 1200 * pitchMod;
  bp.Q.value = 3.5;

  // 저음 thump (판 울림)
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 280;

  const gainMain = ctx.createGain();
  gainMain.gain.setValueAtTime(volume, now);
  gainMain.gain.exponentialRampToValueAtTime(0.001, now + 0.07);

  const gainLow = ctx.createGain();
  gainLow.gain.setValueAtTime(volume * 0.4, now);
  gainLow.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

  src.connect(bp); bp.connect(gainMain); gainMain.connect(ctx.destination);
  const src2 = ctx.createBufferSource();
  src2.buffer = buf;
  src2.connect(lp); lp.connect(gainLow); gainLow.connect(ctx.destination);

  src.start(now); src.stop(now + 0.08);
  src2.start(now); src2.stop(now + 0.12);
}

// MP3 재생 — 매번 새 Audio 객체로 신뢰성 확보
function playAudio(path, volume = 1.0, playbackRate = 1.0) {

  a.volume = volume;
  a.playbackRate = playbackRate;
  a.play().catch(() => {});
}

  while (BGM_TRACKS.length > 1 && i === bgmLastIndex);

// ============================================
// INITIAL BOARD SETUP
// ============================================
function createInitialBoard() {
  const board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
  const place = (c, r, type, team) => { board[r][c] = { type, team }; };

  // Han (top, green)
  place(0,0,TYPES.CHARIOT,HAN); place(1,0,TYPES.HORSE,HAN); place(2,0,TYPES.ELEPHANT,HAN);
  place(3,0,TYPES.GUARD,HAN); place(5,0,TYPES.GUARD,HAN);
  place(6,0,TYPES.ELEPHANT,HAN); place(7,0,TYPES.HORSE,HAN); place(8,0,TYPES.CHARIOT,HAN);
  place(4,1,TYPES.KING,HAN);
  place(1,2,TYPES.CANNON,HAN); place(7,2,TYPES.CANNON,HAN);
  for (let c = 0; c <= 8; c += 2) place(c, 3, TYPES.SOLDIER, HAN);

  // Cho (bottom, red)
  place(0,9,TYPES.CHARIOT,CHO); place(1,9,TYPES.HORSE,CHO); place(2,9,TYPES.ELEPHANT,CHO);
  place(3,9,TYPES.GUARD,CHO); place(5,9,TYPES.GUARD,CHO);
  place(6,9,TYPES.ELEPHANT,CHO); place(7,9,TYPES.HORSE,CHO); place(8,9,TYPES.CHARIOT,CHO);
  place(4,8,TYPES.KING,CHO);
  place(1,7,TYPES.CANNON,CHO); place(7,7,TYPES.CANNON,CHO);
  for (let c = 0; c <= 8; c += 2) place(c, 6, TYPES.SOLDIER, CHO);

  return board;
}

function cloneBoard(board) {
  return board.map(row => row.map(cell => cell ? {...cell} : null));
}

// ============================================
// MOVE GENERATION
// ============================================
function getMoves(board, col, row) {
  const piece = board[row][col];
  if (!piece) return [];
  const moves = [];
  const team = piece.team;
  const enemy = team === CHO ? HAN : CHO;

  switch (piece.type) {
    case TYPES.KING:
    case TYPES.GUARD:
      getKingGuardMoves(board, col, row, team, moves);
      break;
    case TYPES.CHARIOT:
      getChariotMoves(board, col, row, team, moves);
      break;
    case TYPES.CANNON:
      getCannonMoves(board, col, row, team, moves);
      break;
    case TYPES.HORSE:
      getHorseMoves(board, col, row, team, moves);
      break;
    case TYPES.ELEPHANT:
      getElephantMoves(board, col, row, team, moves);
      break;
    case TYPES.SOLDIER:
      getSoldierMoves(board, col, row, team, moves);
      break;
  }
  return moves;
}

function getKingGuardMoves(board, col, row, team, moves) {
  // Orthogonal within palace
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for (const [dc, dr] of dirs) {
    const nc = col + dc, nr = row + dr;
    if (inPalace(nc, nr, team) && (!board[nr][nc] || board[nr][nc].team !== team)) {
      moves.push([nc, nr]);
    }
  }
  // Diagonal within palace
  const diagDirs = [[1,1],[1,-1],[-1,1],[-1,-1]];
  for (const [dc, dr] of diagDirs) {
    const nc = col + dc, nr = row + dr;
    if (inPalace(nc, nr, team) && palaceDiagConnected(col, row, nc, nr)) {
      if (!board[nr][nc] || board[nr][nc].team !== team) {
        moves.push([nc, nr]);
      }
    }
  }
}

function getChariotMoves(board, col, row, team, moves) {
  // Orthogonal directions
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for (const [dc, dr] of dirs) {
    let nc = col + dc, nr = row + dr;
    while (inBounds(nc, nr)) {
      if (board[nr][nc]) {
        if (board[nr][nc].team !== team) moves.push([nc, nr]);
        break;
      }
      moves.push([nc, nr]);
      nc += dc; nr += dr;
    }
  }
  // Palace diagonal movement
  if (inAnyPalace(col, row)) {
    const diagDirs = [[1,1],[1,-1],[-1,1],[-1,-1]];
    for (const [dc, dr] of diagDirs) {
      let nc = col + dc, nr = row + dr;
      while (inAnyPalace(nc, nr) && palaceDiagConnected(nc - dc, nr - dr, nc, nr)) {
        if (board[nr][nc]) {
          if (board[nr][nc].team !== team) moves.push([nc, nr]);
          break;
        }
        moves.push([nc, nr]);
        nc += dc; nr += dr;
      }
    }
  }
}

function getCannonMoves(board, col, row, team, moves) {
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for (const [dc, dr] of dirs) {
    let nc = col + dc, nr = row + dr;
    let jumped = false;
    while (inBounds(nc, nr)) {
      if (!jumped) {
        if (board[nr][nc]) {
          if (board[nr][nc].type === TYPES.CANNON) break; // can't jump over cannon
          jumped = true;
        }
      } else {
        if (board[nr][nc]) {
          if (board[nr][nc].team !== team && board[nr][nc].type !== TYPES.CANNON) {
            moves.push([nc, nr]);
          }
          break;
        }
        moves.push([nc, nr]);
      }
      nc += dc; nr += dr;
    }
  }
  // Palace diagonal cannon moves
  if (inAnyPalace(col, row)) {
    const diagDirs = [[1,1],[1,-1],[-1,1],[-1,-1]];
    for (const [dc, dr] of diagDirs) {
      let nc = col + dc, nr = row + dr;
      let jumped = false;
      while (inAnyPalace(nc, nr) && palaceDiagConnected(nc - dc, nr - dr, nc, nr)) {
        if (!jumped) {
          if (board[nr][nc]) {
            if (board[nr][nc].type === TYPES.CANNON) break;
            jumped = true;
          }
        } else {
          if (board[nr][nc]) {
            if (board[nr][nc].team !== team && board[nr][nc].type !== TYPES.CANNON) {
              moves.push([nc, nr]);
            }
            break;
          }
          moves.push([nc, nr]);
        }
        nc += dc; nr += dr;
      }
    }
  }
}

function getHorseMoves(board, col, row, team, moves) {
  const steps = [
    { first: [1, 0], seconds: [[2, 1], [2, -1]] },
    { first: [-1, 0], seconds: [[-2, 1], [-2, -1]] },
    { first: [0, 1], seconds: [[1, 2], [-1, 2]] },
    { first: [0, -1], seconds: [[1, -2], [-1, -2]] }
  ];
  for (const { first, seconds } of steps) {
    const mc = col + first[0], mr = row + first[1];
    if (!inBounds(mc, mr) || board[mr][mc]) continue; // blocked
    for (const [dc, dr] of seconds) {
      const nc = col + dc, nr = row + dr;
      if (inBounds(nc, nr) && (!board[nr][nc] || board[nr][nc].team !== team)) {
        moves.push([nc, nr]);
      }
    }
  }
}

function getElephantMoves(board, col, row, team, moves) {
  const steps = [
    { first: [1, 0], mid: [2, 1], dest: [3, 2] },
    { first: [1, 0], mid: [2, -1], dest: [3, -2] },
    { first: [-1, 0], mid: [-2, 1], dest: [-3, 2] },
    { first: [-1, 0], mid: [-2, -1], dest: [-3, -2] },
    { first: [0, 1], mid: [1, 2], dest: [2, 3] },
    { first: [0, 1], mid: [-1, 2], dest: [-2, 3] },
    { first: [0, -1], mid: [1, -2], dest: [2, -3] },
    { first: [0, -1], mid: [-1, -2], dest: [-2, -3] }
  ];
  for (const { first, mid, dest } of steps) {
    const fc = col + first[0], fr = row + first[1];
    if (!inBounds(fc, fr) || board[fr][fc]) continue;
    const mc = col + mid[0], mr = row + mid[1];
    if (!inBounds(mc, mr) || board[mr][mc]) continue;
    const nc = col + dest[0], nr = row + dest[1];
    if (inBounds(nc, nr) && (!board[nr][nc] || board[nr][nc].team !== team)) {
      moves.push([nc, nr]);
    }
  }
}

function getSoldierMoves(board, col, row, team, moves) {
  const forward = team === CHO ? -1 : 1;
  const dirs = [[0, forward], [1, 0], [-1, 0]];
  for (const [dc, dr] of dirs) {
    const nc = col + dc, nr = row + dr;
    if (inBounds(nc, nr) && (!board[nr][nc] || board[nr][nc].team !== team)) {
      moves.push([nc, nr]);
    }
  }
  // Palace diagonal (forward only)
  if (inAnyPalace(col, row)) {
    const diagDirs = [[1, forward], [-1, forward]];
    for (const [dc, dr] of diagDirs) {
      const nc = col + dc, nr = row + dr;
      if (inAnyPalace(nc, nr) && palaceDiagConnected(col, row, nc, nr)) {
        if (!board[nr][nc] || board[nr][nc].team !== team) {
          moves.push([nc, nr]);
        }
      }
    }
  }
}

// ============================================
// CHECK / LEGAL MOVE VALIDATION
// ============================================
function findKing(board, team) {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c] && board[r][c].team === team && board[r][c].type === TYPES.KING)
        return [c, r];
  return null;
}

function isUnderAttack(board, col, row, byTeam) {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c] && board[r][c].team === byTeam) {
        const moves = getMoves(board, c, r);
        if (moves.some(([mc, mr]) => mc === col && mr === row)) return true;
      }
  return false;
}

function isInCheck(board, team) {
  const king = findKing(board, team);
  if (!king) return true;
  const enemy = team === CHO ? HAN : CHO;
  return isUnderAttack(board, king[0], king[1], enemy);
}

function makeMove(board, fromC, fromR, toC, toR) {
  const newBoard = cloneBoard(board);
  const captured = newBoard[toR][toC];
  newBoard[toR][toC] = newBoard[fromR][fromC];
  newBoard[fromR][fromC] = null;
  return { board: newBoard, captured };
}

function getLegalMoves(board, col, row) {
  const piece = board[row][col];
  if (!piece) return [];
  const rawMoves = getMoves(board, col, row);
  return rawMoves.filter(([tc, tr]) => {
    const { board: newBoard } = makeMove(board, col, row, tc, tr);
    return !isInCheck(newBoard, piece.team);
  });
}

function getAllLegalMoves(board, team) {
  const moves = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c] && board[r][c].team === team) {
        const legal = getLegalMoves(board, c, r);
        for (const [tc, tr] of legal) {
          moves.push({ from: [c, r], to: [tc, tr] });
        }
      }
  return moves;
}

function isCheckmate(board, team) {
  return getAllLegalMoves(board, team).length === 0;
}

// ============================================
// AI ENGINE
// ============================================
function evaluateBoard(board, forTeam, depth = 0) {
  let score = 0;
  const enemy = forTeam === CHO ? HAN : CHO;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const p = board[r][c];
      if (!p) continue;
      let val = PIECE_VALUES[p.type];

      // 병/졸 전진 보너스
      if (p.type === TYPES.SOLDIER) {
        val += (p.team === CHO ? (9 - r) : r) * 0.12;
      }

      // 차: 중앙 열 선호 + 적진 진입 보너스
      if (p.type === TYPES.CHARIOT) {
        val += (4 - Math.abs(c - 4)) * 0.15;
        val += (p.team === CHO ? (9 - r) : r) * 0.08;
      }

      // 마/상: 중앙 가까울수록 유리
      if (p.type === TYPES.HORSE || p.type === TYPES.ELEPHANT) {
        val += (4 - Math.abs(c - 4)) * 0.12;
        val += (3 - Math.abs(r - 4.5)) * 0.06;
      }

      // 포: 적 기물 뒤에 있을수록 유리 (간접 측정: 앞에 기물 존재)
      if (p.type === TYPES.CANNON) {
        const dr = p.team === CHO ? -1 : 1;
        let hasScreen = false;
        for (let nr = r + dr; nr >= 0 && nr < ROWS; nr += dr) {
          if (board[nr][c]) { hasScreen = true; break; }
        }
        val += hasScreen ? 0.4 : -0.2;
      }

      if (p.team === forTeam) score += val;
      else score -= val;
    }
  }

  // 기동성 보너스 (depth < 4일 때만 계산)
  if (depth < 4) {
    const myMoves = getAllLegalMoves(board, forTeam).length;
    const enemyMoves = getAllLegalMoves(board, enemy).length;
    score += (myMoves - enemyMoves) * 0.04;
  }

  // 장군 보너스
  if (isInCheck(board, enemy)) score += 2.5;
  if (isInCheck(board, forTeam)) score -= 2.5;

  return score;
}

function orderMoves(board, moves) {
  // 포획 이동 먼저, 가치 높은 포획 우선 → 알파베타 가지치기 효율 향상
  return moves.sort((a, b) => {
    const ta = board[a.to[1]][a.to[0]];
    const tb = board[b.to[1]][b.to[0]];
    const va = ta ? PIECE_VALUES[ta.type] : 0;
    const vb = tb ? PIECE_VALUES[tb.type] : 0;
    return vb - va;
  });
}

function minimax(board, depth, alpha, beta, maximizing, team, enemy, maxDepth = null) {
  if (maxDepth === null) maxDepth = depth; // Set on first call
  if (depth === 0) return { score: evaluateBoard(board, team, maxDepth) };

  const currentTeam = maximizing ? team : enemy;
  const moves = orderMoves(board, getAllLegalMoves(board, currentTeam));

  if (moves.length === 0) {
    return { score: maximizing ? -999 : 999 };
  }

  let bestMove = null;

  if (maximizing) {
    let maxScore = -Infinity;
    for (const move of moves) {
      const { board: newBoard } = makeMove(board, move.from[0], move.from[1], move.to[0], move.to[1]);
      const result = minimax(newBoard, depth - 1, alpha, beta, false, team, enemy, maxDepth);
      if (result.score > maxScore) {
        maxScore = result.score;
        bestMove = move;
      }
      alpha = Math.max(alpha, maxScore);
      if (beta <= alpha) break;
    }
    return { score: maxScore, move: bestMove };
  } else {
    let minScore = Infinity;
    for (const move of moves) {
      const { board: newBoard } = makeMove(board, move.from[0], move.from[1], move.to[0], move.to[1]);
      const result = minimax(newBoard, depth - 1, alpha, beta, true, team, enemy, maxDepth);
      if (result.score < minScore) {
        minScore = result.score;
        bestMove = move;
      }
      beta = Math.min(beta, minScore);
      if (beta <= alpha) break;
    }
    return { score: minScore, move: bestMove };
  }
}

async function getAIMove(board, aiTeam, difficulty) {
  const diff = DIFFICULTIES[difficulty];

  if (wasmReady) {
    try {
      const moveStr = await wasmGetBestMove(diff.wasmDepth, diff.skillLevel, diff.limitStrength, diff.elo);
      if (moveStr && moveStr !== '(none)' && moveStr !== '0000') {
        const parsed = fromUCI(moveStr);
        if (parsed) return parsed;
      }
    } catch (err) {
      console.warn('WASM engine error, falling back:', err);
    }
  }

  // Fallback to built-in minimax
  return getAIMoveFallback(board, aiTeam, difficulty);
}

function getAIMoveFallback(board, aiTeam, difficulty) {
  const diff = DIFFICULTIES[difficulty];
  const enemy = aiTeam === CHO ? HAN : CHO;
  const moves = getAllLegalMoves(board, aiTeam);
  if (moves.length === 0) return null;
  if (Math.random() < diff.random) {
    return moves[Math.floor(Math.random() * moves.length)];
  }
  const result = minimax(board, diff.depth, -Infinity, Infinity, true, aiTeam, enemy);
  return result.move || moves[0];
}

// Get top 2 recommended moves for a team
function getRecommendedMoves(board, team, count = 2) {
  const enemy = team === CHO ? HAN : CHO;
  const moves = getAllLegalMoves(board, team);
  if (moves.length === 0) return [];

  const scored = moves.map(move => {
    const { board: newBoard } = makeMove(board, move.from[0], move.from[1], move.to[0], move.to[1]);
    const score = minimax(newBoard, 2, -Infinity, Infinity, false, team, enemy).score;
    return { ...move, score };
  });

  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, count);
}

async function initWasmEngine() {
  try {
    const script = document.createElement('script');
    script.src = './engine/stockfish.js';
    await new Promise((resolve, reject) => {
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });

    wasmEngine = await Stockfish();

    wasmEngine.addMessageListener((msg) => {
      if (msg.startsWith('bestmove')) {
        const parts = msg.split(' ');
        const moveStr = parts[1];
        if (pendingBestMove) {
          pendingBestMove(moveStr);
          pendingBestMove = null;
        }
      }
    });

    wasmEngine.postMessage('uci');
    await new Promise(r => setTimeout(r, 300));
    wasmEngine.postMessage('setoption name UCI_Variant value janggi');
    wasmEngine.postMessage('setoption name Threads value 1');
    wasmEngine.postMessage('setoption name Hash value 16');
    wasmEngine.postMessage('isready');
    await new Promise(r => setTimeout(r, 200));

    wasmReady = true;
    console.log('Fairy-Stockfish WASM engine ready!');
  } catch (err) {
    console.warn('WASM engine failed to load, falling back to built-in AI:', err);
    wasmReady = false;
  }
}

// Convert internal coordinates to UCI notation
// Internal: col 0-8, row 0-9 (row 0 = top)
// UCI janggi: file a-i, rank 1-10 (rank 1 = bottom, rank 10 = top)
function toUCI(col, row) {
  const file = String.fromCharCode(97 + col); // a-i
  const rank = 10 - row; // row 0 -> rank 10, row 9 -> rank 1
  return file + rank;
}

function fromUCI(uci) {
  // Handle pass move
  if (uci === '0000' || uci === 'pass') return null;

  // Parse: find where from ends and to begins
  // from: file_char + rank_digits, to: file_char + rank_digits
  let i = 1;
  while (i < uci.length && uci[i] >= '0' && uci[i] <= '9') i++;
  const fromFile = uci.charCodeAt(0) - 97;
  const fromRank = parseInt(uci.substring(1, i));
  const toFile = uci.charCodeAt(i) - 97;
  const toRank = parseInt(uci.substring(i + 1));

  return {
    from: [fromFile, 10 - fromRank],
    to: [toFile, 10 - toRank]
  };
}

function boardToMoveStr(fromC, fromR, toC, toR) {
  return toUCI(fromC, fromR) + toUCI(toC, toR);
}

async function wasmGetBestMove(depth, skillLevel, limitStrength, elo) {
  if (!wasmReady) return null;

  // Set difficulty
  if (limitStrength) {
    wasmEngine.postMessage('setoption name UCI_LimitStrength value true');
    wasmEngine.postMessage(`setoption name UCI_Elo value ${elo}`);
  } else {
    wasmEngine.postMessage('setoption name UCI_LimitStrength value false');
  }
  wasmEngine.postMessage(`setoption name Skill Level value ${skillLevel}`);

  // Set position
  if (wasmMoveHistory.length === 0) {
    wasmEngine.postMessage('position startpos');
  } else {
    wasmEngine.postMessage('position startpos moves ' + wasmMoveHistory.join(' '));
  }

  // Search
  return new Promise((resolve) => {
    pendingBestMove = resolve;
    wasmEngine.postMessage(`go depth ${depth}`);
    // Timeout fallback
    setTimeout(() => {
      if (pendingBestMove) {
        wasmEngine.postMessage('stop');
      }
    }, 10000);
  });
}

function selectPiece(col, row) {
  if (state.gameOver) return;
  // 진행 중인 애니메이션이 있으면 즉시 마무리 (callback 이 board/turn 을 갱신할 수 있음)
  finishCurrentAnim();
  if (state.gameOver || state.aiThinking) return;
  // 인터럽트 결과로 턴이 상대(AI)로 넘어갔다면, 같은 클릭으로 또 다른 동작이 일어나면 안 됨
  if (state.mode === 'ai' && state.turn === HAN) return;
  // 온라인: 대국 중이고 내 차례일 때만 입력 허용 (상대 말/상대 차례 차단)
  if (state.mode === 'online' && (state.onlinePhase !== 'playing' || state.turn !== state.mySide)) return;
  tryStartBGM();
  // finishCurrentAnim 으로 board 가 변경됐을 수 있으니 piece 는 그 후에 읽음
  const piece = state.board[row][col];

  if (state.selected) {
    const [sc, sr] = state.selected;
    const selPiece = state.board[sr]?.[sc];
    // 선택해 둔 말이 사라졌거나(이미 이동/캡처됨) 내 말이 아니면 선택 무효화
    if (!selPiece || selPiece.team !== state.turn) {
      state.selected = null;
      state.legalMoves = [];
    } else {
      // 인터럽트로 보드가 바뀌었을 수 있으니 legalMoves 를 항상 현재 보드 기준으로 재계산
      state.legalMoves = getLegalMoves(state.board, sc, sr);
      if (state.legalMoves.some(([mc, mr]) => mc === col && mr === row)) {
        executeMove(sc, sr, col, row);
        return;
      }
    }
  }

  if (piece && piece.team === state.turn) {
    state.selected = [col, row];
    state.legalMoves = getLegalMoves(state.board, col, row);
  } else {
    state.selected = null;
    state.legalMoves = [];
  }
  state.lastMoveGhost = null;
  // 선택만 바뀔 땐 부분 DOM 업데이트로 즉각 반응 (전체 innerHTML 재빌드 회피)
  applySelectionDOM();
}

function getCellSize() {

}
function getPieceSize(pieceType) {

}
function getPieceHeight(pieceType) {

// 기물 내부 마크업 — 이미지말 또는 팬시 한글말(state.koreanPieces). 보드/포획/고스트 공용
function pieceMarkup(team, type, w, h) {
  if (state.koreanPieces) {
    const box = Math.round(h);            // 정사각 토큰 (이미지 세로폭에 맞춰 안 붐비게)

// 선택 상태 변경을 기존 DOM에 직접 반영해 click→paint 지연 최소화
function applySelectionDOM() {
  // Clear previous selection visuals
  document.querySelectorAll('.piece.selected').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.cell .move-dot, .cell .recommend-ghost').forEach(el => el.remove());

  if (!state.selected) return;
  const [sc, sr] = state.selected;
  const selectedPiece = state.board[sr][sc];
  if (!selectedPiece) return;

  // Highlight selected piece
  const selCell = document.querySelector(`.cell[data-col="${sc}"][data-row="${sr}"]`);
  selCell?.querySelector('.piece')?.classList.add('selected');

  // Build recommended-to lookup for ghost rendering
  const recToMap = {};
  if (state.showRecommend && state.recommended.length > 0) {
    for (const m of state.recommended) {
      const fromKey = `${m.from[0]},${m.from[1]}`;
      const selKey = `${sc},${sr}`;
      if (fromKey === selKey) recToMap[`${m.to[0]},${m.to[1]}`] = m;
    }
  }

  // Legal-move dots and recommend ghosts
  for (const [mc, mr] of state.legalMoves) {
    const cell = document.querySelector(`.cell[data-col="${mc}"][data-row="${mr}"]`);
    if (!cell) continue;
    const hasPiece = !!cell.querySelector('.piece');
    const recTo = recToMap[`${mc},${mr}`];
    if (recTo) {
      const gW = getPieceSize(selectedPiece.type);
      const gH = getPieceHeight(selectedPiece.type);
      const ghost = document.createElement('div');
      ghost.className = 'recommend-ghost';
      ghost.innerHTML = pieceMarkup(selectedPiece.team, selectedPiece.type, gW, gH);
      cell.appendChild(ghost);
    } else if (state.beginnerMode && !hasPiece) {
      const dot = document.createElement('div');
      dot.className = 'move-dot';
      cell.appendChild(dot);
    }
  }
}

// 추천 계산은 무거우니(minimax depth=2) 클릭 응답을 막지 않도록 비동기로 미룸
let recommendToken = 0;
function scheduleRecommend(team) {
  const myToken = ++recommendToken;
  setTimeout(() => {
    if (myToken !== recommendToken) return; // 더 새로운 요청이 들어왔으면 폐기
    if (state.gameOver) return;
    if (!state.showRecommend) return;
    if (state.turn !== team) return;
    state.recommended = getRecommendedMoves(state.board, team);
    // 선택 중이 아닐 때만 렌더(선택 중에는 추천이 다음 차례에 다시 계산됨)
    if (!state.selected) render();
  }, 0);
}

function executeMove(fromC, fromR, toC, toR) {
  const piece = state.board[fromR][fromC];
  // 안전장치: 잘못된 호출(턴 불일치/빈 칸/적 말)은 무시
  if (!piece || piece.team !== state.turn) return;
  // 안전장치: 적 왕을 직접 잡는 호출은 거부 (체크메이트 검사가 먼저 끝났어야 함)
  const target = state.board[toR][toC];
  if (target && target.type === TYPES.KING) {
    console.warn('[guard] king-capture call blocked', {fromC, fromR, toC, toR});
    return;
  }
  const isCapture = state.board[toR][toC] !== null;

  const executeMoveFinal = () => {
    const { board: newBoard, captured } = makeMove(state.board, fromC, fromR, toC, toR);
    if (captured) {
      state.captured[captured.team].push(captured);
      playCaptureSound();
    } else {
      playMoveSound();
    }
    state.board = newBoard;
    state.lastMove = { from: [fromC, fromR], to: [toC, toR] };
    state.moveHistory.push(state.lastMove);
    // Track move in UCI history for WASM engine
    const uciMoveStr = boardToMoveStr(fromC, fromR, toC, toR);
    wasmMoveHistory.push(uciMoveStr);
    state.selected = null;
    state.legalMoves = [];

    // 온라인: 내 수를 상대에게 전송 (체크메이트로 끝나는 수도 반드시 전송돼야 하므로 여기서)
    if (state.mode === 'online') {
      onlineSend({ type: 'move', from: [fromC, fromR], to: [toC, toR] });
    }

    const enemy = state.turn === CHO ? HAN : CHO;

    // Check for checkmate
    if (isCheckmate(state.board, enemy)) {
      state.gameOver = true;
      state.winner = state.turn;
      state.recommended = [];
      playWinSound(state.turn);
      render();
      return;
    }

    // 장군 → 음성만 재생, 시각적 하이라이트/상태바 표시 없음
    if (isInCheck(state.board, enemy)) {
      playJanggunSound(state.turn);
    }
    state.inCheck = null;

    state.turn = enemy;

    // 추천은 무거우니 우선 비워서 즉시 렌더하고, 계산은 비동기로 이후 보강
    state.recommended = [];
    render();
    if (state.showRecommend && !(state.mode === 'ai' && state.turn === HAN)) {
      scheduleRecommend(state.turn);
    }

    // AI move
    if (state.mode === 'ai' && state.turn === HAN && !state.gameOver) {
      state.aiThinking = true;
      render();
      setTimeout(async () => {
        const aiMove = await getAIMove(state.board, HAN, state.difficulty);
        if (aiMove) {
          state.aiThinking = false;
          pushUndoSnapshot(); // AI 수 직전 스냅샷 (turn === HAN)
          const aiPiece = state.board[aiMove.from[1]][aiMove.from[0]];

          // Record move in UCI history for WASM engine
          const uciMove = boardToMoveStr(aiMove.from[0], aiMove.from[1], aiMove.to[0], aiMove.to[1]);
          wasmMoveHistory.push(uciMove);

          // Hide the original piece during animation (no ghost)
          state.board[aiMove.from[1]][aiMove.from[0]] = null;
          render();

          const executeAIMoveFinal = () => {
            // Restore piece at original position before makeMove (makeMove needs it)
            state.board[aiMove.from[1]][aiMove.from[0]] = aiPiece;
            const { board: nb, captured: cap } = makeMove(state.board, aiMove.from[0], aiMove.from[1], aiMove.to[0], aiMove.to[1]);
            if (cap) {
              state.captured[cap.team].push(cap);
              playCaptureSound();
            } else {
              playMoveSound();
            }
            state.board = nb;
            // 보드가 바뀌었으므로 이전 선택/합법수는 무효
            state.selected = null;
            state.legalMoves = [];
            state.lastMove = { from: aiMove.from, to: aiMove.to };
            state.moveHistory.push(state.lastMove);

            if (isCheckmate(state.board, CHO)) {
              state.gameOver = true;
              state.winner = HAN;
              state.recommended = [];
              playWinSound(HAN);
            } else {
              // 장군 → 음성만 재생
              if (isInCheck(state.board, CHO)) {
                playJanggunSound(HAN);
              }
              state.inCheck = null;
              state.turn = CHO;
              state.recommended = [];
            }
            render();
            if (!state.gameOver && state.showRecommend) {
              scheduleRecommend(CHO);
            }
          };

          animateMove(aiMove.from[0], aiMove.from[1], aiMove.to[0], aiMove.to[1], aiPiece.type, aiPiece.team, executeAIMoveFinal);
        } else {
          state.aiThinking = false;
          state.gameOver = true;
          state.winner = CHO;
          state.lastMoveGhost = null;
          playWinSound(CHO);
          render();
        }
      }, 50);
    }
  };

  if (state.mode === 'ai') pushUndoSnapshot(); // 내 수 직전 스냅샷 (무르기용)
  animateMove(fromC, fromR, toC, toR, piece.type, piece.team, executeMoveFinal);
}

// ============================================
// RENDERING
// ============================================
function render() {
  const app = document.getElementById('app');
  // 셀 크기는 모듈 스코프 헬퍼가 사용

  // Status text
  const L = LANG[state.lang];
  let statusText, statusClass;
  if (state.gameOver) {
    const winnerName = state.winner === CHO ? L.cho : L.han;
    statusText = L.win(winnerName);
    statusClass = 'game-over';
  } else if (state.aiThinking) {
    statusText = `<span class="thinking">${L.aiThinking}</span>`;
    statusClass = 'han-turn';
  } else {
    const turnName = state.turn === CHO ? L.cho : L.han;
    statusText = L.turn(turnName);
    statusClass = state.turn === CHO ? 'cho-turn' : 'han-turn';
  }

  // Build recommended move lookup
  const recFromMap = {};
  const recToMap = {};
  if (state.showRecommend && state.recommended.length > 0) {
    if (!state.selected) {
      // Phase 1: 선택 전 — 추천 기물 강조
      state.recommended.forEach((rec, i) => {
        const fk = `${rec.from[0]},${rec.from[1]}`;
        if (!recFromMap[fk]) recFromMap[fk] = { rank: i + 1 };
      });
    } else {
      // Phase 2: 선택 후 — 선택된 기물의 추천 목적지에 고스트 표시
      const selKey = `${state.selected[0]},${state.selected[1]}`;
      state.recommended.forEach((rec, i) => {
        if (`${rec.from[0]},${rec.from[1]}` === selKey) {
          const tk = `${rec.to[0]},${rec.to[1]}`;
          if (!recToMap[tk]) recToMap[tk] = { rank: i + 1 };
        }
      });
    }
  }

  // Board cells
  let boardCells = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const piece = state.board[r][c];
      const isSelected = state.selected && state.selected[0] === c && state.selected[1] === r;
      const isLegal = state.legalMoves.some(([mc, mr]) => mc === c && mr === r);
      const isLastFrom = state.lastMove && state.lastMove.from[0] === c && state.lastMove.from[1] === r;
      const isLastTo = state.lastMove && state.lastMove.to[0] === c && state.lastMove.to[1] === r;
      const key = `${c},${r}`;
      const recFrom = recFromMap[key];
      const recTo = recToMap[key];

      let cellContent = '';

      // last-move 링 제거 — 기물에 직접 클래스로 표시

      // Legal move dot — 빈 칸에만, 고스트가 있는 칸은 제외
      if (state.beginnerMode && isLegal && !piece && !recTo) {
        cellContent += `<div class="move-dot"></div>`;
      }
      // capture ring 제거 — 상대 기물 위에 동그라미 표시 없음

      // Piece
      if (piece) {
        const selClass = isSelected ? ' selected' : '';
        const recClass = recFrom && !state.selected ? ' recommended' : '';
        const lastClass = isLastTo && !isSelected ? ' last-moved' : '';
        const chkClass = (state.inCheck && piece.type === TYPES.KING && piece.team === state.inCheck) ? ' in-check' : '';
        const pW = getPieceSize(piece.type);
        const pH = getPieceHeight(piece.type);
        cellContent += `<div class="piece ${piece.team}${selClass}${recClass}${lastClass}${chkClass}">${pieceMarkup(piece.team, piece.type, pW, pH)}</div>`;
      }

      // Recommended destination ghost pieces (Phase 2 - when a piece is selected)
      if (state.selected && recTo && isLegal) {
        const selectedPiece = state.board[state.selected[1]][state.selected[0]];
        const gW = getPieceSize(selectedPiece.type);
        const gH = getPieceHeight(selectedPiece.type);
        cellContent += `<div class="recommend-ghost">${pieceMarkup(selectedPiece.team, selectedPiece.type, gW, gH)}</div>`;
      }

      boardCells += `<div class="cell" data-col="${c}" data-row="${r}">${cellContent}</div>`;
    }
  }

  // Captured pieces display — 중요도 내림차순 정렬
  const sortByValue = arr => [...arr].sort((a, b) => PIECE_VALUES[b.type] - PIECE_VALUES[a.type]);

  // ---- 온라인 대전 UI 조각 ----
  const isOnline = state.mode === 'online';
  const O = LANG[state.lang].online;
  const flippedClass = (isOnline && state.mySide === HAN) ? ' flipped' : '';
  let onlineBar = '';
  if (isOnline && onlineConn && (state.onlinePhase === 'waiting' || state.onlinePhase === 'playing')) {
    const sideName = state.mySide === CHO ? L.cho : L.han;
    const sideCls = state.mySide === CHO ? 'cho' : 'han';
    let turnTag = '';
    if (state.onlinePhase === 'playing' && !state.gameOver) {
      const mine = state.turn === state.mySide;
      turnTag = `<span class="ot-turn ${mine ? 'mine' : 'opp'}">${mine ? O.myturn : O.oppturn}</span>`;
    }
    onlineBar = `<div class="online-bar">`
      + `<span class="ot-code" onclick="copyRoomCode()" title="${O.copy}">${O.share(onlineConn.code)} ⧉</span>`
      + `<span class="ot-side ${sideCls}">${O.side(sideName)}</span>`
      + turnTag + `</div>`;
  }
  const onlineToast = (isOnline && state.onlineMsg) ? `<div class="online-toast">${state.onlineMsg}</div>` : '';

  // 컨트롤 버튼 — 온라인/AI 분기
  let controlsHtml = '';
  if (isOnline) {
    if (state.onlinePhase === 'playing' || state.onlinePhase === 'waiting') {
      controlsHtml = `<div class="controls"><div class="controls-row">`
        + (state.gameOver ? `<button class="btn-start" onclick="onlineRematch()">${O.rematch}</button>` : '')
        + (!state.gameOver && state.onlinePhase === 'playing' ? `<button class="btn-stop" onclick="onlineResign()">${O.resign}</button>` : '')
        + `<button class="btn-stop" onclick="onlineLeave(false)">${O.leave}</button>`
        + `<button class="btn-toggle ${state.beginnerMode ? 'active' : ''}" onclick="toggleBeginnerMode()">${L.beginner}</button>`
        + `<button class="btn-toggle ${state.showRecommend ? 'active' : ''}" onclick="toggleRecommend()">${L.hint}</button>`
        + `<button class="btn-toggle ${state.koreanPieces ? 'active' : ''}" onclick="toggleKorean()">${L.korean}</button>`
        + `<button class="btn-toggle ${state.bgmOn ? 'active' : ''}" onclick="toggleBgm()">${L.bgm}</button>`
        + `</div></div>`;
    }
  } else {
    controlsHtml = `<div class="controls"><div class="controls-row">`
      + `<button class="btn-start" onclick="resetGame()">${L.newGame}</button>`
      + (state.gameOver ? `<button class="btn-stop" onclick="quitGame()">${L.quit}</button>` : '')
      + `<button class="btn-toggle" onclick="undoMove()"${canUndo() ? '' : ' disabled'}>${L.undo}</button>`
      + `<button class="btn-toggle ${state.beginnerMode ? 'active' : ''}" onclick="toggleBeginnerMode()">${L.beginner}</button>`
      + `<button class="btn-toggle ${state.showRecommend ? 'active' : ''}" onclick="toggleRecommend()">${L.hint}</button>`
      + `<button class="btn-toggle ${state.koreanPieces ? 'active' : ''}" onclick="toggleKorean()">${L.korean}</button>`
      + `<button class="btn-toggle ${state.bgmOn ? 'active' : ''}" onclick="toggleBgm()">${L.bgm}</button>`
      + `</div></div>`;
  }

  // 오버레이 — 온라인 로비/대기/만석/끊김/종료
  let overlayHtml = '';
  if (isOnline && state.onlinePhase === 'lobby') {
    overlayHtml = `<div class="modal-overlay"><div class="modal online-lobby" onclick="event.stopPropagation()">`
      + `<h2>${O.title}</h2><p>${O.desc}</p>`
      + `<button class="btn-start" style="display:block;width:100%;margin:0 0 14px;" onclick="onlineCreate()">${O.create}</button>`
      + `<div class="lobby-join"><input id="roomCodeInput" maxlength="6" placeholder="${O.codePh}" autocomplete="off" autocapitalize="characters" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')onlineJoinFromInput()">`
      + `<button class="btn-toggle" onclick="onlineJoinFromInput()">${O.enter}</button></div>`
      + `<button onclick="onlineLeave(false)" style="background:#555;margin-top:16px;">${O.leave}</button>`
      + `</div></div>`;
  } else if (isOnline && state.onlinePhase === 'connecting') {
    overlayHtml = `<div class="modal-overlay"><div class="modal" onclick="event.stopPropagation()"><h2 class="thinking">${O.connecting}</h2></div></div>`;
  } else if (isOnline && state.onlinePhase === 'waiting') {
    overlayHtml = `<div class="modal-overlay"><div class="modal" onclick="event.stopPropagation()">`
      + `<h2>${O.waiting}</h2>`
      + `<div class="room-code-big" onclick="copyRoomCode()" title="${O.copy}">${onlineConn ? onlineConn.code : ''}</div>`
      + `<p>${O.hint}</p>`
      + `<button class="btn-toggle" onclick="copyRoomCode()">${O.copy}</button>`
      + `<button onclick="onlineLeave(false)" style="background:#555;margin-left:8px;">${O.leave}</button>`
      + `</div></div>`;
  } else if (isOnline && state.onlinePhase === 'full') {
    overlayHtml = `<div class="modal-overlay"><div class="modal" onclick="event.stopPropagation()">`
      + `<h2>${O.full}</h2>`
      + `<button onclick="openOnlineLobby()">${O.retry}</button>`
      + `<button onclick="onlineLeave(false)" style="background:#555;margin-left:8px;">${O.leave}</button>`
      + `</div></div>`;
  } else if (isOnline && state.onlinePhase === 'lost') {
    overlayHtml = `<div class="modal-overlay"><div class="modal" onclick="event.stopPropagation()">`
      + `<h2>${O.lost}</h2>`
      + `<button onclick="onlineReconnect()">${O.retry}</button>`
      + `<button onclick="onlineLeave(false)" style="background:#555;margin-left:8px;">${O.leave}</button>`
      + `</div></div>`;
  } else if (state.gameOver && isOnline) {
    const iWon = state.winner === state.mySide;
    overlayHtml = `<div class="modal-overlay"><div class="modal" onclick="event.stopPropagation()">`
      + `<h2>${iWon ? O.win : O.lose}</h2>`
      + (state.onlineMsg ? `<p>${state.onlineMsg}</p>` : '')
      + `<button onclick="onlineRematch()">${O.rematch}</button>`
      + `<button onclick="onlineLeave(false)" style="background:#555;margin-left:8px;">${O.leave}</button>`
      + `</div></div>`;
  } else if (state.gameOver) {
    overlayHtml = `<div class="modal-overlay" onclick="resetGame()"><div class="modal" onclick="event.stopPropagation()">`
      + `<h2>${L.win(state.winner === CHO ? L.cho : L.han)}</h2>`
      + `<p>${state.winner === CHO ? (state.mode === 'ai' ? L.winAI : L.winP(L.cho)) : (state.mode === 'ai' ? L.loseAI : L.winP(L.han))}</p>`
      + `<button onclick="resetGame()">${L.retry}</button>`
      + `<button onclick="quitGame()" style="background:#555;margin-left:8px;">${L.quit}</button>`
      + `</div></div>`;
  }

  app.innerHTML = `
    <div class="nav-bar">
      <a href="../../index.html" class="home-btn">${L.home}</a>
      <h1 translate="no" style="font-size:20px;letter-spacing:3px;">${L.title}</h1>
      <button class="lang-btn" onclick="cycleLang()">${state.lang === 'ko' ? '🇰🇷 KO' : state.lang === 'ja' ? '🇯🇵 JP' : '🇬🇧 EN'}</button>
    </div>
    <div class="mode-tabs">
      ${['practice','match','challenge'].map(m =>
        `<button class="mode-tab ${state.gameMode === m ? 'active' : ''}" onclick="changeGameMode('${m}')">${L.gameModes[m]}</button>`
      ).join('')}
    </div>
    ${onlineBar}
    <div class="game-layout">
      <div class="board-stack">
        <div class="trophy-bar top han ${!state.gameOver && state.turn === HAN ? 'active' : ''}">${sortByValue(state.captured.cho).map(p => {
            const capW = getPieceSize(p.type) * 0.7;
            const capH = getPieceHeight(p.type) * 0.7;
            return `<div class="captured-piece cho">${pieceMarkup('cho', p.type, capW, capH)}</div>`;
          }).join('')}</div>
      <div class="board-container${flippedClass}">
      <svg class="board-lines" viewBox="0 0 432 480" xmlns="http://www.w3.org/2000/svg">
        ${(() => {
          let lines = '';
          const cx = c => c * 48 + 24;
          const cy = r => r * 48 + 24;
          const S = '#6B4E10';
          // Horizontal lines
          for (let r = 0; r < ROWS; r++) {
            lines += `<line x1="${cx(0)}" y1="${cy(r)}" x2="${cx(8)}" y2="${cy(r)}" stroke="${S}" stroke-width="${(r===0||r===9)?2:1.2}"/>`;
          }
          // Vertical lines — continuous top to bottom
          for (let c = 0; c < COLS; c++) {
            lines += `<line x1="${cx(c)}" y1="${cy(0)}" x2="${cx(c)}" y2="${cy(9)}" stroke="${S}" stroke-width="${(c===0||c===8)?2:1.2}"/>`;
          }
          // Palace diagonals
          lines += `<line x1="${cx(3)}" y1="${cy(0)}" x2="${cx(5)}" y2="${cy(2)}" stroke="${S}" stroke-width="1.5"/>`;
          lines += `<line x1="${cx(5)}" y1="${cy(0)}" x2="${cx(3)}" y2="${cy(2)}" stroke="${S}" stroke-width="1.5"/>`;
          lines += `<line x1="${cx(3)}" y1="${cy(7)}" x2="${cx(5)}" y2="${cy(9)}" stroke="${S}" stroke-width="1.5"/>`;
          lines += `<line x1="${cx(5)}" y1="${cy(7)}" x2="${cx(3)}" y2="${cy(9)}" stroke="${S}" stroke-width="1.5"/>`;
          return lines;
        })()}
      </svg>
      <div class="board">${boardCells}</div>
      <!-- ghost removed -->
    </div>
        <div class="trophy-bar bottom cho ${!state.gameOver && state.turn === CHO && !state.aiThinking ? 'active' : ''}">${sortByValue(state.captured.han).map(p => {
            const capW = getPieceSize(p.type) * 0.7;
            const capH = getPieceHeight(p.type) * 0.7;
            return `<div class="captured-piece han">${pieceMarkup('han', p.type, capW, capH)}</div>`;
          }).join('')}</div>
      </div>
    </div>
    ${controlsHtml}
    ${overlayHtml}
    ${onlineToast}
  `;

}

// 셀 클릭은 #app에 위임된 pointerdown 한 번만 부착해 매 렌더마다 재부착 비용 제거 + 터치 지연 제거
(function attachCellDelegate() {
  const app = document.getElementById('app');
  if (!app || app.dataset.cellDelegate) return;
  app.dataset.cellDelegate = '1';
  app.addEventListener('pointerdown', (e) => {
    const cell = e.target.closest && e.target.closest('.cell');
    if (!cell) return;
    const col = parseInt(cell.dataset.col);
    const row = parseInt(cell.dataset.row);
    if (Number.isNaN(col) || Number.isNaN(row)) return;
    selectPiece(col, row);
  });
})();

function cycleLang() {
  const langs = ['ko', 'ja', 'en'];
  const currentIndex = langs.indexOf(state.lang);
  state.lang = langs[(currentIndex + 1) % langs.length];
  render();
}

function changeLang(lang) {
  state.lang = lang;
  render();
}

function toggleBgm() {
  state.bgmOn = !state.bgmOn;
  if (state.bgmOn) {
    if (bgmStarted) playBGM();
  } else {
    stopBGM();
  }
  render();
}

function quitGame() {
  stopBGM();
  window.location.href = '/';
}

function changeMode(mode) {
  state.mode = mode;
  resetGame();
}

function changeGameMode(newMode) {
  if (newMode === 'challenge') {
    alert(LANG[state.lang].comingSoon);
    return;
  }
  if (newMode === 'match') {
    openOnlineLobby();
    return;
  }
  // practice — 온라인 연결 중이면 조용히 정리
  if (state.mode === 'online') onlineLeave(true);
  state.gameMode = newMode;
  state.mode = 'ai';
  state.onlinePhase = null;
  state.mySide = null;
  // Practice mode uses index 0 (강한 AI)
  state.difficulty = 0;
  resetGame();
}

// ============================================
// 온라인 대전 (방 코드 · WebSocket)
// ============================================
const ROOM_ALPHABET = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // 0/O/1/I/L 제외
function genRoomCode() {
  let c = '';
  for (let i = 0; i < 4; i++) c += ROOM_ALPHABET[Math.floor(Math.random() * ROOM_ALPHABET.length)];
  return c;
}
function getOrCreatePlayerId() {
  let id = localStorage.getItem('in9-janggi-pid');
  if (!id) {
    id = 'p-' + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
    localStorage.setItem('in9-janggi-pid', id);
  }
  return id;
}
function flashOnlineMsg(text, ms = 2600) {
  state.onlineMsg = text;
  render();
  if (onlineMsgTimer) clearTimeout(onlineMsgTimer);
  onlineMsgTimer = setTimeout(() => { state.onlineMsg = ''; render(); }, ms);
}

// 빈 보드로 초기화 (온라인 진입/리셋 공용)
function clearOnlineBoard() {
  state.board = createInitialBoard();
  state.turn = CHO;
  state.selected = null;
  state.legalMoves = [];
  state.captured = { cho: [], han: [] };
  state.gameOver = false;
  state.winner = null;
  state.aiThinking = false;
  state.lastMove = null;
  state.moveHistory = [];
  state.recommended = [];
  state.inCheck = null;
  state.lastMoveGhost = null;
  wasmMoveHistory = [];
  undoStack = [];
}

function openOnlineLobby() {
  onlineLeave(true);           // 기존 연결 정리(조용히)
  state.mode = 'online';
  state.gameMode = 'match';
  state.onlinePhase = 'lobby';
  state.mySide = null;
  state.onlineMsg = '';
  state.showRecommend = false; // 사람 상대 — 훈수 기본 off
  clearOnlineBoard();
  render();
}

function onlineCreate() { onlineConnect(genRoomCode()); }
function onlineJoinFromInput() {
  const el = document.getElementById('roomCodeInput');
  const code = ((el && el.value) || '').trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (code.length < 1) { if (el) el.focus(); return; }
  onlineConnect(code);
}
function onlineReconnect() {
  const code = onlineConn && onlineConn.code;
  if (!code) { openOnlineLobby(); return; }
  onlineConnect(code);
}

function onlineConnect(code) {
  const playerId = getOrCreatePlayerId();
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/api/room/${encodeURIComponent(code)}?playerId=${encodeURIComponent(playerId)}`;
  let ws;
  try { ws = new WebSocket(url); }
  catch (e) { state.onlinePhase = 'lost'; render(); return; }
  onlineConn = { ws, code, playerId, side: null, opponentConnected: false };
  state.mode = 'online';
  state.gameMode = 'match';
  state.onlinePhase = 'connecting';
  render();

  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    handleServerMsg(msg);
  };
  ws.onclose = () => {
    if (!onlineConn || onlineConn.ws !== ws) return;     // 교체/의도적 종료는 무시
    if (state.mode === 'online' && state.onlinePhase !== 'full') {
      state.onlinePhase = 'lost';
      render();
    }
  };
  ws.onerror = () => {
    if (!onlineConn || onlineConn.ws !== ws) return;
    if (state.mode === 'online' && state.onlinePhase !== 'full') {
      state.onlinePhase = 'lost';
      render();
    }
  };
}

function onlineSend(obj) {
  if (onlineConn && onlineConn.ws && onlineConn.ws.readyState === WebSocket.OPEN) {
    try { onlineConn.ws.send(JSON.stringify(obj)); } catch {}
  }
}

function handleServerMsg(msg) {
  switch (msg.type) {
    case 'welcome': {
      if (!onlineConn) return;
      onlineConn.side = msg.side;
      onlineConn.opponentConnected = !!msg.opponentConnected;
      state.mySide = msg.side === 'cho' ? CHO : HAN;
      replayOnlineMoves(msg.moves || []);
      state.onlinePhase = onlineConn.opponentConnected ? 'playing' : 'waiting';
      render();
      break;
    }
    case 'full':
      state.onlinePhase = 'full';
      render();
      break;
    case 'opponentJoined': {
      if (onlineConn) onlineConn.opponentConnected = true;
      const wasWaiting = state.onlinePhase !== 'playing';
      state.onlinePhase = 'playing';
      if (wasWaiting) flashOnlineMsg(OL().joined); else render();
      break;
    }
    case 'opponentLeft':
      if (onlineConn) onlineConn.opponentConnected = false;
      flashOnlineMsg(OL().left, 4000);
      break;
    case 'move':
      applyOpponentMove(msg.from, msg.to);
      break;
    case 'reset':
      clearOnlineBoard();
      state.onlinePhase = 'playing';
      render();
      break;
    case 'resign':
      state.gameOver = true;
      state.winner = state.mySide;
      state.onlineMsg = OL().resigned;
      playWinSound(state.mySide);
      render();
      break;
  }
}

// 서버가 보낸 전체 수 목록으로 보드 재구성 (재접속/새로고침 동기화)
function replayOnlineMoves(moves) {
  clearOnlineBoard();
  for (const mv of moves) {
    if (!mv || !mv.from || !mv.to) continue;
    const [fc, fr] = mv.from, [tc, tr] = mv.to;
    const piece = state.board[fr] && state.board[fr][fc];
    if (!piece) continue;
    const { board: nb, captured } = makeMove(state.board, fc, fr, tc, tr);
    if (captured) state.captured[captured.team].push(captured);
    state.board = nb;
    state.lastMove = { from: [fc, fr], to: [tc, tr] };
    state.moveHistory.push(state.lastMove);
    wasmMoveHistory.push(boardToMoveStr(fc, fr, tc, tr));
    state.turn = state.turn === CHO ? HAN : CHO;
  }
  if (isCheckmate(state.board, state.turn)) {
    state.gameOver = true;
    state.winner = state.turn === CHO ? HAN : CHO;
  }
}

// 상대 수 적용 (애니 + 커밋, 재전송 없음) — AI 경로 미러
function applyOpponentMove(from, to) {
  finishCurrentAnim();
  if (!from || !to) return;
  const [fc, fr] = from, [tc, tr] = to;
  const piece = state.board[fr] && state.board[fr][fc];
  if (!piece) { console.warn('[online] 상대 수가 빈 칸에서 시작 — 무시', from, to); return; }
  wasmMoveHistory.push(boardToMoveStr(fc, fr, tc, tr));
  state.board[fr][fc] = null;   // 애니 동안 원위치 기물 숨김
  render();
  const finalize = () => {
    state.board[fr][fc] = piece; // makeMove 전에 복원
    const { board: nb, captured } = makeMove(state.board, fc, fr, tc, tr);
    if (captured) { state.captured[captured.team].push(captured); playCaptureSound(); }
    else playMoveSound();
    state.board = nb;
    state.selected = null;
    state.legalMoves = [];
    state.lastMove = { from: [fc, fr], to: [tc, tr] };
    state.moveHistory.push(state.lastMove);
    const mover = piece.team;
    const next = mover === CHO ? HAN : CHO;
    if (isCheckmate(state.board, next)) {
      state.gameOver = true;
      state.winner = mover;
      playWinSound(mover);
    } else {
      if (isInCheck(state.board, next)) playJanggunSound(mover);
      state.inCheck = null;
      state.turn = next;
    }
    render();
    if (!state.gameOver && state.showRecommend && state.turn === state.mySide) {
      scheduleRecommend(state.turn);
    }
  };
  animateMove(fc, fr, tc, tr, piece.type, piece.team, finalize);
}

function onlineRematch() {
  onlineSend({ type: 'reset' });
  clearOnlineBoard();
  state.onlinePhase = 'playing';
  render();
}
function onlineResign() {
  if (state.gameOver) return;
  onlineSend({ type: 'resign' });
  state.gameOver = true;
  state.winner = state.mySide === CHO ? HAN : CHO;
  playWinSound(state.winner);
  render();
}

function onlineLeave(silent) {
  if (onlineMsgTimer) { clearTimeout(onlineMsgTimer); onlineMsgTimer = null; }
  if (onlineConn && onlineConn.ws) {
    const ws = onlineConn.ws;
    try { if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'leave' })); } catch {}
    onlineConn = null;          // onclose 가 'lost' 처리하지 않도록 먼저 끊음
    try { ws.close(1000, 'leave'); } catch {}
  } else {
    onlineConn = null;
  }
  if (!silent) {
    state.mode = 'ai';
    state.gameMode = 'practice';
    state.onlinePhase = null;
    state.mySide = null;
    state.onlineMsg = '';
    state.showRecommend = true;
    state.difficulty = 0;
    resetGame();
  }
}

function copyRoomCode() {
  if (!onlineConn) return;
  const done = () => flashOnlineMsg(OL().copied, 1500);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(onlineConn.code).then(done).catch(done);
  } else { done(); }
}

function changeDifficulty(val) {
  state.difficulty = parseInt(val);
  state.recommended = [];
  render();
  if (state.showRecommend && !state.gameOver) scheduleRecommend(state.turn);
}

function toggleRecommend() {
  state.showRecommend = !state.showRecommend;
  state.recommended = [];
  render();
  if (state.showRecommend && !state.gameOver) scheduleRecommend(state.turn);
}

function toggleBeginnerMode() {
  state.beginnerMode = !state.beginnerMode;
  render();
}

function toggleKorean() {
  state.koreanPieces = !state.koreanPieces;
  render();
}

// ===== 무르기(undo) — AI 연습 모드 전용. 매 ply 직전 스냅샷을 쌓고, 내 차례로 되감는다 =====
function snapshotForUndo() {
  return {
    board: state.board.map(row => row.map(c => c ? { team: c.team, type: c.type } : null)),
    turn: state.turn,
    captured: { cho: state.captured.cho.map(p => ({ ...p })), han: state.captured.han.map(p => ({ ...p })) },
    lastMove: state.lastMove ? { from: [...state.lastMove.from], to: [...state.lastMove.to] } : null,
    moveHistoryLen: state.moveHistory.length,
    wasmLen: wasmMoveHistory.length,
    inCheck: state.inCheck
  };
}
function pushUndoSnapshot() {
  undoStack.push(snapshotForUndo());
  if (undoStack.length > 120) undoStack.shift();
}
function canUndo() {
  return state.mode === 'ai' && !state.aiThinking && undoStack.length > 0;
}
function undoMove() {
  if (!canUndo()) return;
  // 내 차례(초)로 돌아갈 때까지 되감는다 — 보통 [AI 한 수 + 내 한 수] 2 ply
  let snap = undoStack.pop();
  while (undoStack.length > 0 && snap.turn !== CHO) snap = undoStack.pop();
  state.board = snap.board.map(row => row.map(c => c ? { team: c.team, type: c.type } : null));
  state.turn = snap.turn;
  state.captured = { cho: snap.captured.cho.map(p => ({ ...p })), han: snap.captured.han.map(p => ({ ...p })) };
  state.lastMove = snap.lastMove;
  state.moveHistory.length = snap.moveHistoryLen;
  wasmMoveHistory.length = snap.wasmLen;
  state.inCheck = snap.inCheck;
  state.selected = null;
  state.legalMoves = [];
  state.recommended = [];
  state.gameOver = false;
  state.winner = null;
  state.aiThinking = false;
  state.lastMoveGhost = null;
  render();
  if (state.showRecommend) scheduleRecommend(state.turn);
}

// Initialize
state.recommended = [];
render();
if (state.showRecommend) scheduleRecommend(state.turn);
initWasmEngine();
</script>
